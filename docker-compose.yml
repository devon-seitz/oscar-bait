services:
  oscar-bait:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/oscar_bait.db
      - ADMIN_PASSCODE=${ADMIN_PASSCODE:?Set ADMIN_PASSCODE in .env}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
      - MAINTENANCE_MODE=${MAINTENANCE_MODE:-false}
    volumes:
      - oscar-data:/app/data

volumes:
  oscar-data:
